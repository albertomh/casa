# On Tag pipeline
# Runs when a semver tag is pushed up to GitHub.
name: on-tag

on:
  push:
    # run this workflow only if the tag matches the format 'vM.m.p' (semver)
    tags:
      - 'v*.*.*'

jobs:
  checks:
    uses: ./.github/workflows/_pre-build-checks.yaml

  deploy:
    runs-on: ubuntu-slim
    needs: checks
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        shell: bash
      - run: pnpm run deploy
        shell: bash
        env:
        # CLOUDFLARE_API_TOKEN is an API token (<https://dash.cloudflare.com/profile/api-tokens>)
        # with permissions:
        #   - Workers Scripts:Edit
        #   - Account Settings:Read
        #   - Memberships:Read

          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
