<details
    class="collapse collapse-arrow bg-base-100 border border-base-300 mb-2"
    open
>
    <summary class="collapse-title font-semibold">{{ tray_label }}</summary>
    <div class="collapse-content">
        <ul id="tray-{{ tray_id }}" class="mb-3">
            {{ items }}
        </ul>
        <form
            hx-post="/freezers/trays/{{ tray_id }}/items"
            hx-target="#tray-{{ tray_id }}"
            hx-swap="innerHTML"
            hx-on::after-request="this.reset()"
            class="flex gap-2"
        >
            <input
                name="name"
                placeholder="Add item"
                class="input input-bordered input-sm flex-1"
            >
            <button type="submit" class="btn btn-sm btn-primary">ADD</button>
        </form>
    </div>
</details>
