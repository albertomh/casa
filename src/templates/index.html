<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Casa</title>

        <script
            src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta2/dist/htmx.min.js"
            integrity="sha256-pjSzEogUoaAIpUrIIHV+0YhaaPiIuW6H0uuBwrIgu2o="
            crossorigin="anonymous"
        ></script>

        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        >

        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"
        ></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap"
            rel="stylesheet"
        >

        <style>
        .tiny5-regular {
            font-family: "Tiny5", sans-serif;
            font-weight: 400;
            font-style: normal;
        }
        details.collapse-arrow[open] > .collapse-title::after {
            transform: translateY(-50%) rotate(225deg);
        }
        </style>
        <script>
        const dragCounters = new WeakMap();

        function getHighlightTargets(zone) {
            return [zone, zone.querySelector("summary")].filter(Boolean);
        }
        function highlight(zone) {
            getHighlightTargets(zone).forEach((el) => {
                el.classList.add("bg-info/20");
            });
            zone.querySelector("summary")?.style.setProperty(
                "background",
                "oklch(var(--p) / 0.2)",
            );
        }

        function unhighlight(zone) {
            getHighlightTargets(zone).forEach((el) => {
                el.classList.remove("bg-info/20");
            });
            zone.querySelector("summary")?.style.removeProperty("background");
        }
        document.addEventListener("dragstart", (e) => {
            const li = e.target.closest("li[data-item-id]");
            if (!li) return;
            e.dataTransfer.setData("text/plain", li.dataset.itemId);
            e.dataTransfer.effectAllowed = "move";
        });

        document.addEventListener("dragenter", (e) => {
            const zone = e.target.closest("[data-tray-id]");
            if (!zone) return;
            const count = (dragCounters.get(zone) ?? 0) + 1;
            dragCounters.set(zone, count);
            if (count === 1) highlight(zone);
        });

        document.addEventListener("dragover", (e) => {
            if (e.target.closest("[data-tray-id]")) e.preventDefault();
        });

        document.addEventListener("dragleave", (e) => {
            const zone = e.target.closest("[data-tray-id]");
            if (!zone) return;
            const count = (dragCounters.get(zone) ?? 1) - 1;
            dragCounters.set(zone, count);
            if (count === 0) unhighlight(zone);
        });

        document.addEventListener("drop", (e) => {
            const zone = e.target.closest("[data-tray-id]");
            if (!zone) return;
            e.preventDefault();
            dragCounters.set(zone, 0);
            unhighlight(zone);
            const itemId = e.dataTransfer.getData("text/plain");
            const trayId = zone.dataset.trayId;
            htmx.ajax("POST", `/freezers/items/${itemId}/move`, {
                target: "#trays",
                swap: "outerHTML",
                values: { tray_id: trayId },
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            document
                .getElementById("ts-toggle")
                .addEventListener("click", (e) => {
                    const btn = e.currentTarget;
                    const curShowingIso =
                        btn.textContent.trim() === "show date 🗓️";
                    btn.textContent = curShowingIso
                        ? "show time since ⏳"
                        : "show date 🗓️";
                    document.querySelectorAll(".js-timestamp").forEach((el) => {
                        el.textContent = curShowingIso
                            ? el.dataset.iso.split(" ")[0]
                            : el.dataset.humanized;
                    });
                });
        });

        document.addEventListener("submit", (e) => {
            if (e.target.tagName === "FORM") e.target.reset();
        });

        document.addEventListener("htmx:afterRequest", (e) => {
            const elt = e.detail?.elt ?? e.target;
            if (elt?.tagName === "FORM") elt.reset();
        });
        </script>
    </head>

    <body class="select-none">
        <header
            class="flex items-center justify-between px-4 py-1 bg-white text-sm"
        >
            <h1 class="tiny5-regular font-mono text-lg text-info">FREEZER</h1>
            <div class="flex items-center">
                <button
                    type="button"
                    id="ts-toggle"
                    class="btn btn-xs font-mono"
                >
                    show date 🗓️
                </button>
            </div>
        </header>
        <div id="app" hx-get="/ui" hx-trigger="load" hx-target="#app">
            loading
        </div>
    </body>
</html>
