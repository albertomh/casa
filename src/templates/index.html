<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Casa</title>

        <script
            src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta2/dist/htmx.min.js"
            integrity="sha256-pjSzEogUoaAIpUrIIHV+0YhaaPiIuW6H0uuBwrIgu2o="
            crossorigin="anonymous"
        ></script>

        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        >

        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"
        ></script>

        <style>
        details.collapse-arrow[open] > .collapse-title::after {
            transform: translateY(-50%) rotate(225deg);
        }
        </style>
        <script>
        document.addEventListener("dragstart", (e) => {
            const li = e.target.closest("li[data-item-id]");
            if (!li) return;
            e.dataTransfer.setData("text/plain", li.dataset.itemId);
            e.dataTransfer.effectAllowed = "move";
        });

        document.addEventListener("dragover", (e) => {
            const zone = e.target.closest("[data-tray-id]");
            if (!zone) return;
            e.preventDefault();
            zone.classList.add(
                "ring-2",
                "ring-primary",
                "ring-inset",
                "bg-primary/10",
            );
        });

        document.addEventListener("dragleave", (e) => {
            const zone = e.target.closest("[data-tray-id]");
            if (!zone || zone.contains(e.relatedTarget)) return;
            zone.classList.remove(
                "ring-2",
                "ring-primary",
                "ring-inset",
                "bg-primary/10",
            );
        });

        document.addEventListener("drop", (e) => {
            const zone = e.target.closest("[data-tray-id]");
            if (!zone) return;
            e.preventDefault();
            zone.classList.remove(
                "ring-2",
                "ring-primary",
                "ring-inset",
                "bg-primary/10",
            );
            const itemId = e.dataTransfer.getData("text/plain");
            const trayId = zone.dataset.trayId;
            htmx.ajax("POST", `/freezers/items/${itemId}/move`, {
                target: "#trays",
                swap: "outerHTML",
                values: { tray_id: trayId },
            });
        });

        document.addEventListener("submit", (e) => {
            if (e.target.tagName === "FORM") e.target.reset();
        });

        document.addEventListener("htmx:afterRequest", (e) => {
            const elt = e.detail?.elt ?? e.target;
            if (elt?.tagName === "FORM") elt.reset();
        });
        </script>
    </head>

    <body>
        <div id="app" hx-get="/ui" hx-trigger="load" hx-target="#app">
            loading
        </div>
    </body>
</html>
