<!doctype html>
<html lang="en">
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <script

            integrity="sha256-pjSzEogUoaAIpUrIIHV+0YhaaPiIuW6H0uuBwrIgu2o="
            crossorigin="anonymous"
        ></script>

        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"

        <link

        .global-header a {

        .global-header h1 {

            font-size: 1.5rem;
        }
        .global-header h1 i {

        }

            display: inline-block;

    <body>
        <header

            <a href="/">
                <h1>
                    <span class="icon-italic"
