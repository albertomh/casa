<details
    class="group relative rounded-xl overflow-hidden bg-base-100 shadow"
    data-title-card
    name="jennflix-title-card"
>
    <summary class="list-none cursor-pointer select-none">
        <img
            src="{{ poster_path }}"
            alt="{{ title }}"
            class="w-full aspect-[2/3] object-cover"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
        >
        <div
            class="w-full aspect-[2/3] bg-base-300 items-center justify-center text-sm text-center p-4 hidden"
        >
            {{ title }}
        </div>
    </summary>
    <div
        class="js-title-actions pointer-events-none absolute inset-0 hidden flex-col justify-between gap-3 bg-black/80 p-3"
    >
        <div class="grid grid-cols-1 gap-2 h-full pointer-events-auto">
            <a
                href="{{ imdb_url }}"
                target="_blank"
                rel="noopener noreferrer"
                class="btn btn-sm btn-outline min-h-11 text-sm text-white"
                >IMDB <i class="bi bi-box-arrow-up-right"></i></a
            >
            <form method="POST" action="/jennflix/queue" class="contents">
                <input type="hidden" name="title_id" value="{{ id }}">
                <button
                    class="btn btn-sm btn-outline text-green-600 min-h-11 text-sm {{ my_list_btn_class }}"
                    {{ my_list_disabled }}
                    type="submit"
                >
                    {{ my_list_icon }}
                    {{ my_list_label }}
                </button>
            </form>
            <a
                href="/jennflix/titles/{{ id }}/edit"
                class="btn btn-sm btn-ghost min-h-11 text-sm text-white"
                >Edit</a
            >
            <form method="POST" action="/jennflix/titles/{{ id }}/delete">
                <button
                    class="btn btn-sm btn-outline text-red-600 border-red-600 min-h-11 text-sm js-title-delete-btn w-full"
                    type="submit"
                >
                    Delete
                </button>
            </form>
        </div>
    </div>
</details>
