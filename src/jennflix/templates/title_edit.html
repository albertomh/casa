<div class="min-h-screen flex justify-center items-start bg-base-200 py-6">
    <div class="card bg-base-100 shadow w-full max-w-sm">
        <div class="card-body gap-4">
            <div class="flex justify-between">
                <h2 class="text-2xl font-bold mb-2">Edit title</h2>
                <form
                    method="POST"
                    action="/jennflix/titles/{{ id }}/delete"
                    hx-post="/jennflix/titles/{{ id }}/delete"
                    hx-target="#applet"
                    hx-push-url="false"
                    data-delete-confirm-scope
                >
                    <button
                        class="btn btn-sm btn-outline text-red-600 border-red-600 rounded-md uppercase w-40 px-4 js-title-delete-btn"
                        type="submit"
                    >
                        Delete
                    </button>
                </form>
            </div>
            <form
                method="POST"
                action="/jennflix/titles/{{ id }}/edit"
                class="flex flex-col gap-2"
            >
                <input
                    name="title"
                    placeholder="Title"
                    value="{{ title }}"
                    required
                    class="input input-bordered w-full"
                >
                <input
                    name="imdb_url"
                    placeholder="IMDB URL"
                    value="{{ imdb_url }}"
                    required
                    class="input input-bordered w-full"
                >
                <input
                    name="tags"
                    placeholder="Tags"
                    value="{{ tags }}"
                    class="input input-bordered w-full"
                >
                <input
                    name="location"
                    placeholder="Location"
                    value="{{ location }}"
                    class="input input-bordered w-full"
                >
                <input
                    name="poster_path"
                    placeholder="/jennflix/posters/firefly.jpg"
                    value="{{ poster_path }}"
                    class="input input-bordered w-full"
                >
                <div class="flex items-center justify-between gap-3 pt-2">
                    <a
                        href="/jennflix"
                        class="btn btn-sm btn-outline border-gray-400 text-gray-600 rounded-md uppercase w-auto px-4"
                    >
                        Cancel
                    </a>
                    <button
                        type="submit"
                        class="btn btn-sm bg-red-600 text-white rounded-md uppercase self-end w-auto px-4"
                    >
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
