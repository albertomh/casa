{{ scripts }}
{{ header }}
<div class="container mx-auto max-w-xl">
    <h2 class="text-2xl font-bold mb-2">Jennflix Queue</h2>
    <form
        id="jennflix-add-title"
        method="POST"
        action="/jennflix/titles"
        class="mb-4 flex flex-col gap-2"
    >
        <input
            name="title"
            placeholder="Title"
            required
            class="input input-bordered"
        >
        <input
            name="imdb_url"
            placeholder="IMDB URL"
            required
            class="input input-bordered"
        >
        <input name="tags" placeholder="Tags" class="input input-bordered">
        <button type="submit" class="btn btn-primary">Add Title</button>
    </form>
    <h3 class="text-lg font-semibold mt-4">Titles</h3>
    <ul class="list-disc ml-6 mb-6">
        {{ titles }}
    </ul>
    <h3 class="text-lg font-semibold mt-4">Queue</h3>
    <ul class="list-decimal ml-6">
        {{ queue }}
    </ul>
</div>
