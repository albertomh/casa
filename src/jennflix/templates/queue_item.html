<li class="flex items-center gap-2 py-1">
    <div class="flex flex-col gap-0.5">
        <form
            method="POST"
            action="/jennflix/queue/{{ queue_id }}/move"
            class="inline"
        >
            <input type="hidden" name="direction" value="up">
            <button
                class="btn btn-xs btn-ghost p-0 h-4 min-h-0 leading-none"
                type="submit"
                {{ up_disabled }}
            >
                ▲
            </button>
        </form>
        <form
            method="POST"
            action="/jennflix/queue/{{ queue_id }}/move"
            class="inline"
        >
            <input type="hidden" name="direction" value="down">
            <button
                class="btn btn-xs btn-ghost p-0 h-4 min-h-0 leading-none"
                type="submit"
                {{ down_disabled }}
            >
                ▼
            </button>
        </form>
    </div>
    <span class="font-semibold flex-1">{{ title }}</span>
    <form
        method="POST"
        action="/jennflix/queue/{{ queue_id }}/watched"
        class="inline"
    >
        <button class="btn btn-xs bg-green-700 text-white" type="submit">
            <i class="bi bi-check-lg"></i>
            Watched
        </button>
    </form>
</li>
